name: Deploy Full Apache Service to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 44.222.229.148 >> ~/.ssh/known_hosts

      - name: Install and Configure Apache on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ubuntu@44.222.229.148 << 'EOF'
            sudo apt update
            sudo apt install -y apache2 rsync

            sudo systemctl start apache2
            sudo systemctl enable apache2

            sudo mkdir -p /var/www/html
            sudo chown -R ubuntu:ubuntu /var/www/html
            sudo chmod -R 755 /var/www/html
          EOF

      - name: Deploy project files to Apache web root
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ ubuntu@44.222.229.148:/var/www/html/

      - name: Restart Apache
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ubuntu@44.222.229.148 << 'EOF'
            sudo systemctl restart apache2
            sudo systemctl status apache2 --no-pager
          EOF
