
name: CI Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Verify app folder
        run: ls -la app

      - name: Check index.html exists
        run: test -f app/index.html

      - name: Test message
        run: echo "GitHub Actions is working"
